<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --paper:    #FBF7EF;
    --paper2:   #F4EEE1;
    --ink:      #1B1A17;
    --ink-soft: #6B6558;
    --rule:     #E4DAC7;
    --rule2:    #D6C9AF;
    --brand:    #1F4E46;
    --stamp:    #B4322A;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: var(--paper);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  /* faint full-bleed ledger ruling — the slipbook backdrop */
  .ledger {
    position: absolute; inset: 0;
    background-image: linear-gradient(180deg, var(--rule) 1px, transparent 1px);
    background-size: 100% 44px;
    opacity: 0.55;
  }

  .frame {
    position: absolute; inset: 0;
    padding: 76px 84px;
    display: flex; align-items: stretch; gap: 56px;
  }

  /* LEFT: the pitch */
  .left { flex: 1; display: flex; flex-direction: column; justify-content: space-between; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 18px; color: var(--brand); }
  .mark { width: 62px; height: 62px; display: block; }
  .wordmark { font-size: 52px; font-weight: 800; letter-spacing: -0.05em; color: var(--brand); line-height: 1; }

  .headline h1 {
    font-size: 66px; font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.06; color: var(--ink); max-width: 15ch;
  }
  .headline .accent { color: var(--brand); }
  .headline p {
    margin-top: 22px;
    font-size: 27px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--ink-soft); line-height: 1.35; max-width: 26ch;
  }

  .chips { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 11px 19px;
    border: 1px solid var(--rule2);
    border-radius: 999px;
    background: var(--paper2);
    font-size: 21px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--ink-soft);
  }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chip .dot--green { background: var(--brand); }
  .chip .dot--stamp { background: var(--stamp); }

  /* RIGHT: a mini receipt with the perforated tear-edge signature */
  .receipt-col { width: 372px; display: flex; align-items: center; z-index: 2; }
  .receipt {
    position: relative;
    width: 100%;
    background: #fff;
    border: 1px solid var(--rule2);
    box-shadow: 0 30px 60px -30px rgba(40,32,14,0.5);
    padding: 34px 30px 30px;
    transform: rotate(2.4deg);
  }
  .perf {
    position: absolute; left: 0; right: 0; height: 14px;
    background: radial-gradient(circle at 9px 7px, var(--paper) 6px, transparent 6.5px);
    background-size: 18px 14px;
  }
  .perf--top { top: -7px; }
  .perf--bottom { bottom: -7px; }

  .r-head { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 14px; border-bottom: 2px solid var(--ink); }
  .r-biz { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .r-type { font-size: 17px; font-weight: 800; letter-spacing: 0.14em; color: var(--brand); }
  .r-line { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--rule); font-size: 17px; }
  .r-line .d { color: var(--ink); }
  .r-line .a { font-family: var(--mono); color: var(--ink); }
  .r-total { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 2px solid var(--ink); }
  .r-total .l { font-size: 19px; font-weight: 800; }
  .r-total .v { font-family: var(--mono); font-size: 20px; font-weight: 800; color: var(--brand); }

  .stamp {
    position: absolute; bottom: 66px; left: -14px;
    transform: rotate(-11deg);
    font-size: 30px; font-weight: 900; letter-spacing: 0.05em;
    color: var(--stamp);
    border: 4px solid var(--stamp);
    border-radius: 8px;
    padding: 3px 16px;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="ledger"></div>

  <div class="frame">
    <div class="left">
      <div class="brand">
        <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="#FBF7EF"/>
          <path d="M8 5h16v19l-2-1.4-2 1.4-2-1.4-2 1.4-2-1.4-2 1.4-2-1.4V5z" fill="none" stroke="#1F4E46" stroke-width="2" stroke-linejoin="round"/>
          <line x1="11.5" y1="11" x2="20.5" y2="11" stroke="#1F4E46" stroke-width="2" stroke-linecap="round"/>
          <line x1="11.5" y1="15" x2="20.5" y2="15" stroke="#1F4E46" stroke-width="2" stroke-linecap="round"/>
          <line x1="11.5" y1="19" x2="17" y2="19" stroke="#B4322A" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="wordmark">slipbook</span>
      </div>

      <div class="headline">
        <h1>A clean invoice,<br><span class="accent">in under a minute.</span></h1>
        <p>Add your items, then print or save as PDF. No account, no fees.</p>
      </div>

      <div class="chips">
        <span class="chip"><span class="dot dot--green"></span>no sign-up</span>
        <span class="chip"><span class="dot dot--stamp"></span>print or PDF</span>
        <span class="chip"><span class="dot dot--green"></span>offline &amp; private</span>
      </div>
    </div>

    <div class="receipt-col">
      <div class="receipt">
        <div class="perf perf--top"></div>
        <div class="r-head">
          <span class="r-biz">Manila Street Eats</span>
          <span class="r-type">RECEIPT</span>
        </div>
        <div class="r-line"><span class="d">Chicken adobo meal</span><span class="a">₱180.00</span></div>
        <div class="r-line"><span class="d">Iced calamansi ×2</span><span class="a">₱90.00</span></div>
        <div class="r-line"><span class="d">Extra rice</span><span class="a">₱25.00</span></div>
        <div class="r-total"><span class="l">Total</span><span class="v">₱295.00</span></div>
        <div class="stamp">PAID</div>
        <div class="perf perf--bottom"></div>
      </div>
    </div>
  </div>
</body>
</html>
