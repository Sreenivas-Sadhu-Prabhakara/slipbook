<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1F4E46; }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle 76vmin (maskable) */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <!-- receipt slip with perforated tear-edge + ledger lines, in warm paper on ledger-green -->
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <path d="M8 4.5h16v20l-2-1.5-2 1.5-2-1.5-2 1.5-2-1.5-2 1.5-2-1.5V4.5z"
          fill="#FBF7EF" stroke="#FBF7EF" stroke-width="1" stroke-linejoin="round"/>
    <line x1="11.5" y1="10.5" x2="20.5" y2="10.5" stroke="#1F4E46" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11.5" y1="14.5" x2="20.5" y2="14.5" stroke="#1F4E46" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11.5" y1="18.5" x2="17" y2="18.5" stroke="#B4322A" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
</body>
</html>
